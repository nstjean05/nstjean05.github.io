<!DOCTYPE html><head>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>
<body>
<a-scene>
  <a-assets timeout="10000">
    <img id="earth" src="./IMAGES/2k_earth_daymap.jpg" crossorigin="anonymous">
  </a-assets>

  <a-light type="ambient" color="white" intensity="0.8"></a-light>
  <a-light type="directional" color="white" intensity="0.6" position="5 10 7"></a-light>

  <a-sphere
    radius="1.5"
    position="0 2 -5"
    material="src: #earth"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
  </a-sphere>

  <a-box
    position="0 2 -5"
    scale="3 3 3"
    material="color: #888888; transparent: true; opacity: 0.3">
  </a-box>

  <a-camera position="0 0 0"></a-camera>
</a-scene>
</body>
</html>
