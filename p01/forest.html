<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js" crossorigin="anonymous"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const isLocal = ['localhost', '127.0.0.1', '[::1]'].includes(location.hostname);
      const src = isLocal
        ? 'http://localhost:8000/p01/IMAGES/El_Capitan_Yosemite_73.jpg'
        : './IMAGES/El_Capitan_Yosemite_73.jpg';
      document.getElementById('forest').setAttribute('src', src);
    });
  </script>
</head>
<body>
  <a-scene>
    <a-assets>
      <img id="forest" crossorigin="anonymous">
    </a-assets>

    <a-sky id="mySky" src="#forest"></a-sky>

    <a-text
      font="kelsonsans"
      value="Behold El Cap!"
      width="6"
      position="-2.5 1.5 -10"

      
    ></a-text>
  </a-scene>
</body>
</html>
