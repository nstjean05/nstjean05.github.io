<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Stellar System</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; }
      details {
        position: absolute; top: 20px; left: 20px;
        color: white; font-family: Arial; z-index: 10;
        background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px;
      }
      summary { cursor: pointer; font-weight: bold; }
      #stats {
        position: absolute; top: 20px; right: 20px;
        color: white; font-family: monospace; font-size: 12px; z-index: 10;
        background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <details open>
      <summary>Controls</summary>
      <p>W/A/S/D to move, mouse to look</p>
    </details>

    <a-scene background="color: #000000">

      <a-entity id="camera-rig" position="0 15 80" rotation="0 0 0">
        <a-camera position="-50 0 5" look-controls wasd-controls user-height="0"></a-camera>
      </a-entity>

      <a-light type="ambient" color="#ffffff" intensity="0.2"></a-light>
      <a-light type="point" color="#ffffff" intensity="1.5" position="0 0 0" distance="400"></a-light>
      <a-sky color="#0a0e27"></a-sky>

      <!-- Sun -->
      <a-sphere radius="3" segments-height="32" segments-width="32"
        material="src: url(./2k_sun.jpg); emissive: #FDB813; emissiveIntensity: 0.8;"
        animation="property: material.emissive; from: #FDB813; to: #FF4400; dur: 8000; dir: alternate; loop: true">
      </a-sphere>
      <!-- sun glow -->
      <a-sphere radius="3.5" segments-height="32" segments-width="32"
        material="color: #FDB813; opacity: 0.3; transparent: true; emissive: #FDB813; emissiveIntensity: 0.6;"
        animation="property: material.opacity; from: 0.3; to: 0.6; dur: 2000; dir: alternate; loop: true">
      </a-sphere>

      <!-- Mercury -->
      <a-entity animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 12000; loop: true; easing: linear;">
        <a-entity position="10 0 0" scale="0.7 0.7 0.7"
          animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 3000; loop: true; easing: linear;">
          <a-sphere radius="1" material="src: url(./2k_ceres_fictional.jpg);"></a-sphere>
        </a-entity>
        <a-circle radius="10" rotation="90 0 0"
          material="color: #888888; opacity: 0.3; transparent: true; shader: flat;" segments="64">
        </a-circle>
      </a-entity>

      <!-- Venus -->
      <a-entity animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 20000; loop: true; easing: linear;">
        <a-entity position="0 0 16" scale="1.0 1.0 1.0"
          animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 4000; loop: true; easing: linear;">
          <a-sphere radius="1" material="src: url(./2k_neptune.jpg);"></a-sphere>
        </a-entity>
        <a-circle radius="16" rotation="90 0 0"
          material="color: #888888; opacity: 0.3; transparent: true; shader: flat;" segments="64">
        </a-circle>
      </a-entity>

      <!-- Earth -->
      <a-entity animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 32000; loop: true; easing: linear;">
        <a-entity position="-24 0 0" scale="1.1 1.1 1.1"
          animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 3500; loop: true; easing: linear;">
          <a-sphere radius="1" material="src: url(./2k_earth_daymap.jpg);"></a-sphere>
        </a-entity>
        <a-circle radius="24" rotation="90 0 0"
          material="color: #888888; opacity: 0.3; transparent: true; shader: flat;" segments="64">
        </a-circle>
      </a-entity>

      <!-- Mars -->
      <a-entity animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 45000; loop: true; easing: linear;">
        <a-entity position="0 0 -32" scale="0.85 0.85 0.85"
          animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 5000; loop: true; easing: linear;">
          <a-sphere radius="1" material="src: url(./2k_mars.jpg);"></a-sphere>
        </a-entity>
        <a-circle radius="32" rotation="90 0 0"
          material="color: #888888; opacity: 0.3; transparent: true; shader: flat;" segments="64">
        </a-circle>
      </a-entity>

      <!-- Asteroid belt -->
      <a-entity asteroid-belt></a-entity>

      <!-- Jupiter -->
      <a-entity animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 60000; loop: true; easing: linear;">
        <a-entity position="32 0 32" scale="1.8 1.8 1.8"
          animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 6000; loop: true; easing: linear;">
          <a-sphere radius="1" material="src: url(./2k_jupiter.jpg);"></a-sphere>
        </a-entity>
        <a-circle radius="45" rotation="90 0 0"
          material="color: #888888; opacity: 0.3; transparent: true; shader: flat;" segments="64">
        </a-circle>
      </a-entity>

      <!-- Stars -->
      <a-entity id="stars"></a-entity>

    </a-scene>

    <script>
      AFRAME.registerComponent('asteroid-belt', {
        init: function () {
          const innerR = 36, outerR = 42;
          for (let i = 0; i < 280; i++) {
            const angle = Math.random() * Math.PI * 2;
            const r = innerR + Math.random() * (outerR - innerR);
            const x = Math.cos(angle) * r;
            const z = Math.sin(angle) * r;
            const y = (Math.random() - 0.5) * 2.5;
            const size = 0.08 + Math.random() * 0.22;
            const grey = Math.floor(80 + Math.random() * 80);
            const dur = 80000 + Math.random() * 60000;
            const start = Math.round(Math.random() * 360);

            // random spin axis per asteroid
            const rx = Math.round(Math.random() * 360);
            const ry = Math.round(Math.random() * 360);
            const rz = Math.round(Math.random() * 360);
            const spinDur = 3000 + Math.random() * 8000;

            const a = document.createElement('a-entity');
            a.setAttribute('position', `${x} ${y} ${z}`);
            a.setAttribute('animation__orbit', `property: rotation; from: 0 ${start} 0; to: 0 ${start + 360} 0; dur: ${dur}; loop: true; easing: linear`);

            const sphere = document.createElement('a-sphere');
            sphere.setAttribute('radius', size);
            sphere.setAttribute('segments-height', '6');
            sphere.setAttribute('segments-width', '6');
            sphere.setAttribute('material', `color: rgb(${grey},${grey},${grey}); roughness: 1; metalness: 0`);
            sphere.setAttribute('animation__spin', `property: rotation; from: ${rx} ${ry} ${rz}; to: ${rx + 360} ${ry + 360} ${rz + 360}; dur: ${spinDur}; loop: true; easing: linear`);

            a.appendChild(sphere);
            this.el.appendChild(a);
          }
        }
      });

      document.addEventListener('DOMContentLoaded', function () {
        const stars = document.getElementById('stars');
        for (let i = 0; i < 1500; i++) {
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.acos(2 * Math.random() - 1);
          const r = 450 + Math.random() * 40;
          const x = r * Math.sin(phi) * Math.cos(theta);
          const y = r * Math.sin(phi) * Math.sin(theta);
          const z = r * Math.cos(phi);

          const brightness = Math.floor(180 + Math.random() * 75);
          const tint = Math.random();
          let color;
          if (tint < 0.2)       color = `rgb(${brightness},${brightness-20},${Math.floor(brightness*0.7)})`;
          else if (tint < 0.35) color = `rgb(${Math.floor(brightness*0.8)},${Math.floor(brightness*0.85)},${brightness})`;
          else                  color = `rgb(${brightness},${brightness},${brightness})`;

          const s = document.createElement('a-sphere');
          s.setAttribute('position', `${x} ${y} ${z}`);
          s.setAttribute('radius', 0.3 + Math.random() * 0.9);
          s.setAttribute('segments-height', '4');
          s.setAttribute('segments-width', '4');
          s.setAttribute('material', `color: ${color}; emissive: ${color}; emissiveIntensity: 1; shader: flat`);
          stars.appendChild(s);
        }
      });
    </script>
  </body>
</html>
